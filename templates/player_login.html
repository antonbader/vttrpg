<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spieler Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#b39ddb',
                            DEFAULT: '#673ab7',
                            dark: '#311b92',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="flex justify-center items-center h-screen bg-gray-900">
    <div class="bg-gray-800 p-8 rounded-lg shadow-2xl border border-gray-700 w-full max-w-md text-center">
        <h2 class="text-3xl font-bold text-brand-light mb-4">TTRPG Session Beitritt</h2>
        <p class="mb-6 text-gray-400 text-sm">Gib deinen Charakter-Namen ein, um der aktiven Szene beizutreten.</p>
        <form method="POST" class="space-y-4">
            <input type="text" name="player_name" placeholder="Dein Spielername" required class="w-full p-3 bg-gray-900 border border-gray-600 rounded text-white focus:outline-none focus:border-brand-light text-lg">
            <button type="submit" class="w-full bg-brand text-white py-3 rounded hover:bg-brand-light hover:text-gray-900 transition-colors font-bold text-lg">Beitreten</button>
        </form>
    </div>
</body>
</html>
