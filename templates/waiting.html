<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warten auf Szene...</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .message { font-size: 2rem; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <div class="message">Keine Szene aktiviert</div>

    <script>
        const socket = io();
        const PLAYER_NAME = "{{ player_name or '' }}";

        socket.on('scene_changed', (data) => {
            if (PLAYER_NAME) {
                window.location.href = `/player/scene/${data.scene_id}?player_name=${PLAYER_NAME}`;
            } else {
                window.location.href = `/display`;
            }
        });

    </script>
</body>
</html>
