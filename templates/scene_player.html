<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szene: {{ scene.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; }
        #app-container { display: flex; height: 100vh; position: relative; }

        #canvas-container { flex-grow: 1; position: relative; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; }

        /* The player UI overlay */
        #player-ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 10;
            display: {% if is_display %}none{% else %}block{% endif %};
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="player-ui">
            Eingeloggt als: <strong id="player-name">{{ player_name }}</strong><br>
            <small style="color: #aaa;">Du kannst nur Token bewegen, die "{{ player_name }}" heißen.</small>
        </div>


        <div id="canvas-container" style="position: relative;">
            <div id="view-controls" style="position: absolute; bottom: 20px; right: 20px; z-index: 100; display: flex; gap: 5px;">
                <button id="btn-pan-mode" class="bg-gray-700 text-white p-2 rounded border border-gray-600" title="Verschieben-Modus (Pan)">✋</button>
                <button id="btn-zoom-in" class="bg-gray-700 text-white p-2 rounded border border-gray-600" title="Zoom In">➕</button>
                <button id="btn-zoom-out" class="bg-gray-700 text-white p-2 rounded border border-gray-600" title="Zoom Out">➖</button>
                <button id="btn-zoom-reset" class="bg-gray-700 text-white p-2 rounded border border-gray-600" title="Reset View">Reset</button>
            </div>

            <canvas id="bgLayer"></canvas>
            <canvas id="paintLayer" style="pointer-events: none;"></canvas>
            <canvas id="gridLayer"></canvas>
            <canvas id="tokenLayer"></canvas>
            <!-- FOW for player is fully black by default. The mask will "cut out" the blackness to reveal below -->
            <canvas id="fowLayer" style="pointer-events: none;"></canvas>
            <canvas id="uiLayer" style="pointer-events: none;"></canvas>
        </div>
    </div>

    <script>
        const SCENE_ID = {{ scene.id }};
        const PLAYER_NAME = "{{ player_name }}";
        const IS_DISPLAY = {{ 'true' if is_display else 'false' }};

        const bgCanvas = document.getElementById('bgLayer');
        const paintCanvas = document.getElementById('paintLayer');
        const gridCanvas = document.getElementById('gridLayer');
        const tokenCanvas = document.getElementById('tokenLayer');
        const fowCanvas = document.getElementById('fowLayer');
        const uiCanvas = document.getElementById('uiLayer');

        const bgCtx = bgCanvas.getContext('2d');
        const paintCtx = paintCanvas.getContext('2d');
        const gridCtx = gridCanvas.getContext('2d');
        const tokenCtx = tokenCanvas.getContext('2d');
        const fowCtx = fowCanvas.getContext('2d');
        const uiCtx = uiCanvas.getContext('2d');

        const container = document.getElementById('canvas-container');

        // --- Pan & Zoom ---
        let viewScale = 1.0;
        let viewOffsetX = 0;
        let viewOffsetY = 0;
        let isPanMode = false;
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;

        function updateViewTransform() {
            const transformStr = `translate(${viewOffsetX}px, ${viewOffsetY}px) scale(${viewScale})`;
            bgCanvas.style.transform = transformStr;
            paintCanvas.style.transform = transformStr;
            gridCanvas.style.transform = transformStr;
            tokenCanvas.style.transform = transformStr;
            fowCanvas.style.transform = transformStr;
            uiCanvas.style.transform = transformStr;
        }

        document.getElementById('btn-pan-mode').addEventListener('click', (e) => {
            isPanMode = !isPanMode;
            e.target.style.backgroundColor = isPanMode ? 'green' : '';
        });

        function doZoom(delta, mouseX, mouseY) {
            const oldScale = viewScale;
            if (delta < 0) {
                viewScale *= 1.1;
            } else {
                viewScale /= 1.1;
            }
            viewScale = Math.max(0.1, Math.min(viewScale, 5.0));

            const rect = container.getBoundingClientRect();
            const cx = mouseX !== undefined ? mouseX - rect.left : rect.width / 2;
            const cy = mouseY !== undefined ? mouseY - rect.top : rect.height / 2;

            viewOffsetX = cx - (cx - viewOffsetX) * (viewScale / oldScale);
            viewOffsetY = cy - (cy - viewOffsetY) * (viewScale / oldScale);

            updateViewTransform();
        }

        const btnZoomIn = document.getElementById('btn-zoom-in');
        if (btnZoomIn) btnZoomIn.addEventListener('click', () => doZoom(-1));
        const btnZoomOut = document.getElementById('btn-zoom-out');
        if (btnZoomOut) btnZoomOut.addEventListener('click', () => doZoom(1));
        const btnZoomReset = document.getElementById('btn-zoom-reset');
        if (btnZoomReset) btnZoomReset.addEventListener('click', () => {
            viewScale = 1.0; viewOffsetX = 0; viewOffsetY = 0; updateViewTransform();
        });

        const btnPanMode = document.getElementById('btn-pan-mode');
        if (btnPanMode) btnPanMode.addEventListener('click', () => {
            isPanMode = !isPanMode;
            btnPanMode.style.backgroundColor = isPanMode ? '#4B5563' : 'transparent';
        });

        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            doZoom(e.deltaY, e.clientX, e.clientY);
        });

        let spacePressed = false;
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                spacePressed = true;
                container.style.cursor = 'grab';
            }
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                spacePressed = false;
                container.style.cursor = 'default';
            }
        });

        container.addEventListener('mousedown', (e) => {
            if (e.button === 1 || e.button === 2 || isPanMode || (e.button === 0 && spacePressed)) {
                isPanning = true;
                panStartX = e.clientX - viewOffsetX;
                panStartY = e.clientY - viewOffsetY;
                e.preventDefault();
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isPanning) {
                viewOffsetX = e.clientX - panStartX;
                viewOffsetY = e.clientY - panStartY;
                updateViewTransform();
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 1 || e.button === 2 || isPanMode || (e.button === 0 && spacePressed) || isPanning) {
                isPanning = false;
            }
        });

        container.addEventListener('contextmenu', e => e.preventDefault());

        // Touch Pan
        container.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2 || (e.touches.length === 1 && isPanMode)) {
                isPanning = true;
                panStartX = e.touches[0].clientX - viewOffsetX;
                panStartY = e.touches[0].clientY - viewOffsetY;
            }
        }, {passive: false});

        container.addEventListener('touchmove', (e) => {
            if (isPanning) {
                e.preventDefault();
                viewOffsetX = e.touches[0].clientX - panStartX;
                viewOffsetY = e.touches[0].clientY - panStartY;
                updateViewTransform();
            }
        }, {passive: false});

        window.addEventListener('touchend', () => {
            isPanning = false;
        });

        let gridSize = {{ scene.grid_size or 50 }};
        let gridOffsetX = {{ scene.grid_offset_x or 0 }};
        let gridOffsetY = {{ scene.grid_offset_y or 0 }};
        let scale = {{ scene.scale or 1.5 }};
        let gridColor = "{{ scene.grid_color or 'rgba(255, 255, 255, 0.4)' }}";
        let gridThickness = {{ scene.grid_thickness or 1 }};


        let tokens = {{ tokens|tojson|safe }};
        let bgImage = new Image();
        {% if scene.background_image %}
            bgImage.src = "{{ url_for('uploaded_file', filename=scene.background_image) }}";
        {% endif %}

        const socket = io();
        socket.on('connect', () => {
            socket.emit('join', {scene_id: SCENE_ID});
        });

        // If the GM changes the active scene, we should reload the player to join the new one
        socket.on('scene_changed', (data) => {
            if (IS_DISPLAY) {
                window.location.href = '/display';
            } else {
                window.location.href = `/player/scene/${data.scene_id}?player_name=${PLAYER_NAME}`;
            }
        });

        socket.on('scene_deactivated', () => {
            if (IS_DISPLAY) {
                window.location.href = '/player/waiting';
            } else {
                window.location.href = `/player/waiting?player_name=${PLAYER_NAME}`;
            }
        });

        let fowMaskData = "{{ scene.fow_mask or '' }}";
        let paintDataStr = "{{ scene.paint_data or '' }}";

        function initCanvases() {
            let w = window.innerWidth;
            let h = window.innerHeight;
            if (bgImage.src && bgImage.width > 0) {
                w = bgImage.width;
                h = bgImage.height;
            }
            [bgCanvas, paintCanvas, gridCanvas, tokenCanvas, fowCanvas, uiCanvas].forEach(c => {
                c.width = w;
                c.height = h;
            });

            if (paintDataStr) {
                const img = new Image();
                img.onload = () => {
                    paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
                    paintCtx.drawImage(img, 0, 0);
                };
                img.src = paintDataStr;
            }

            fillFowFullBlack(); // For players, start with full black

            if (fowMaskData) {
                applyFowMask(fowMaskData);
            }

            drawAll();
        }

        if (bgImage.src) {
            bgImage.onload = initCanvases;
        } else {
            // Initialize immediately if no background image
            window.addEventListener('load', initCanvases);
        }

        function fillFowFullBlack() {
            fowCtx.globalCompositeOperation = 'source-over';
            fowCtx.fillStyle = 'black';
            fowCtx.fillRect(0, 0, fowCanvas.width, fowCanvas.height);
        }

        function applyFowMask(maskData) {
            const img = new Image();
            img.onload = () => {
                fowCtx.clearRect(0, 0, fowCanvas.width, fowCanvas.height);
                fowCtx.globalCompositeOperation = 'source-over';
                fowCtx.drawImage(img, 0, 0);
            };
            img.src = maskData;
        }

        function drawAll() {
            if(bgImage.src) {
                bgCtx.clearRect(0,0, bgCanvas.width, bgCanvas.height);
                bgCtx.drawImage(bgImage, 0, 0);
            }
            drawGrid();
            drawTokens();
            drawUI();
        }

        function drawGrid() {
            gridCtx.clearRect(0, 0, gridCanvas.width, gridCanvas.height);
            gridCtx.strokeStyle = gridColor;
            gridCtx.lineWidth = gridThickness;
            gridCtx.beginPath();

            for (let x = gridOffsetX; x < gridCanvas.width; x += gridSize) {
                gridCtx.moveTo(x, 0);
                gridCtx.lineTo(x, gridCanvas.height);
            }
            for (let y = gridOffsetY; y < gridCanvas.height; y += gridSize) {
                gridCtx.moveTo(0, y);
                gridCtx.lineTo(gridCanvas.width, y);
            }
            gridCtx.stroke();
        }

        const loadedImages = {};

        function drawTokens() {
            tokenCtx.clearRect(0, 0, tokenCanvas.width, tokenCanvas.height);

            tokens.forEach(token => {
                const drawX = token.x;
                const drawY = token.y;

                if (token.image_path) {
                    if (!loadedImages[token.image_path]) {
                        loadedImages[token.image_path] = new Image();
                        loadedImages[token.image_path].src = token.image_path;
                        loadedImages[token.image_path].onload = () => drawTokens();
                    } else if (loadedImages[token.image_path].complete) {
                        tokenCtx.save();
                        tokenCtx.beginPath();
                        tokenCtx.arc(drawX + gridSize/2, drawY + gridSize/2, gridSize/2, 0, Math.PI * 2, true);
                        tokenCtx.closePath();
                        tokenCtx.clip();
                        tokenCtx.drawImage(loadedImages[token.image_path], drawX, drawY, gridSize, gridSize);
                        tokenCtx.restore();

                        tokenCtx.strokeStyle = 'black';
                        if (token.name === PLAYER_NAME && !IS_DISPLAY) {
                            tokenCtx.strokeStyle = '#00ff00'; // Highlight own token
                        }
                        tokenCtx.lineWidth = 2;
                        tokenCtx.beginPath();
                        tokenCtx.arc(drawX + gridSize/2, drawY + gridSize/2, gridSize/2, 0, Math.PI * 2, true);
                        tokenCtx.stroke();
                    }
                } else {
                    let color = 'yellow';
                    if (token.type === 'Player') color = 'blue';
                    if (token.type === 'NPC') color = 'red';

                    tokenCtx.fillStyle = color;
                    tokenCtx.beginPath();
                    tokenCtx.arc(drawX + gridSize/2, drawY + gridSize/2, gridSize/2, 0, Math.PI*2);
                    tokenCtx.fill();

                    tokenCtx.strokeStyle = 'black';
                    if (token.name === PLAYER_NAME && !IS_DISPLAY) {
                        tokenCtx.strokeStyle = '#00ff00';
                    }
                    tokenCtx.lineWidth = 2;
                    tokenCtx.stroke();

                    tokenCtx.fillStyle = color === 'yellow' ? 'black' : 'white';
                    tokenCtx.textAlign = 'center';
                    tokenCtx.textBaseline = 'middle';
                    tokenCtx.font = `${Math.max(10, gridSize/4)}px Arial`;
                    tokenCtx.fillText(token.name.substring(0,5), drawX + gridSize/2, drawY + gridSize/2);
                }
            });

        }

        function drawUI() {
            uiCtx.clearRect(0, 0, uiCanvas.width, uiCanvas.height);

            // Draw distance measuring over FOW
            if (measuring && dragToken) {
                uiCtx.beginPath();
                uiCtx.moveTo(dragStartX + gridSize/2, dragStartY + gridSize/2);
                uiCtx.lineTo(dragToken.x + gridSize/2, dragToken.y + gridSize/2);
                uiCtx.strokeStyle = 'rgba(0,255,0,0.8)';
                uiCtx.lineWidth = 3;
                uiCtx.setLineDash([5, 5]);
                uiCtx.stroke();
                uiCtx.setLineDash([]);

                const dx = dragToken.x - dragStartX;
                const dy = dragToken.y - dragStartY;
                const distSquares = Math.sqrt(dx*dx + dy*dy) / gridSize;
                const distMeters = (distSquares * scale).toFixed(1);

                uiCtx.fillStyle = 'rgba(0,0,0,0.7)';
                uiCtx.fillRect(dragToken.x + gridSize/2 + 10, dragToken.y - 20, 60, 25);
                uiCtx.fillStyle = 'white';
                uiCtx.font = "14px Arial";
                uiCtx.textAlign = 'center';
                uiCtx.textBaseline = 'middle';
                uiCtx.fillText(`${distMeters}m`, dragToken.x + gridSize/2 + 40, dragToken.y - 7);
            }

            // Draw selected token name
            if (selectedToken) {
                const drawX = selectedToken.x + gridSize/2;
                const drawY = selectedToken.y + gridSize + 15;

                uiCtx.font = "bold 14px Arial";
                uiCtx.textAlign = "center";
                uiCtx.textBaseline = "middle";
                const textWidth = uiCtx.measureText(selectedToken.name).width;

                uiCtx.fillStyle = "rgba(0, 0, 0, 0.7)";
                uiCtx.fillRect(drawX - textWidth/2 - 5, drawY - 10, textWidth + 10, 20);

                uiCtx.fillStyle = "white";
                uiCtx.fillText(selectedToken.name, drawX, drawY);
            }
        }

        // Helper function to check if a token is visible (not fully covered by Fog of War)
        function isTokenVisible(t) {
            // If there's no FOW mask and the canvas is fully black, it's not visible
            // But actually we have fowCanvas. We can check pixel data.
            // Let's get the bounding box of the token.
            const checkGridStep = 5; // check a pixel every 5 pixels to improve performance

            // To ensure we get correct pixel data, we must check fowCtx.
            // The fow canvas has the mask where alpha is < 255 if it's cleared.
            // If the canvas composite is 'source-over' and filled with black,
            // areas cleared by 'destination-out' will have alpha 0.

            try {
                // If fowCanvas is completely transparent (no FOW used), it should be visible.
                // But by default we fill fow with black for players.
                const imgData = fowCtx.getImageData(t.x, t.y, gridSize, gridSize).data;
                for (let i = 3; i < imgData.length; i += 4 * checkGridStep) {
                    if (imgData[i] < 128) { // If alpha is less than 128, it means this pixel is transparent (cleared FOW)
                        return true;
                    }
                }
                return false; // fully opaque FOW
            } catch (e) {
                // Ignore cross-origin errors if any, fallback to visible
                return true;
            }
        }

        // Token Interaction for Player
        let dragToken = null;
        let selectedToken = null;
        let measuring = false;
        let dragStartX = 0;
        let dragStartY = 0;

        if (!IS_DISPLAY) {
            container.addEventListener('mousedown', (e) => {
                if (e.button === 1 || e.button === 2 || isPanMode || (e.button === 0 && spacePressed)) return; // Don't interact with tokens when panning

                const rect = tokenCanvas.getBoundingClientRect();
                const mouseX = (e.clientX - rect.left) / viewScale;
                const mouseY = (e.clientY - rect.top) / viewScale;

                // Find clicked token (reverse order for top-most)
                let clickedOnToken = false;
                for (let i = tokens.length - 1; i >= 0; i--) {
                    const t = tokens[i];
                    if (mouseX >= t.x && mouseX <= t.x + gridSize &&
                        mouseY >= t.y && mouseY <= t.y + gridSize) {

                        // Check visibility before allowing interaction
                        if (!isTokenVisible(t)) {
                            continue; // Token is hidden by Fog of War
                        }

                        selectedToken = t;
                        clickedOnToken = true;

                        // ONLY allow dragging if token name == player name
                        // Allow dragging if the base name matches (ignore the " 1", " 2" suffixes)
                        if (t.name.startsWith(PLAYER_NAME)) {
                            dragToken = t;
                            dragStartX = t.x;
                            dragStartY = t.y;
                            measuring = true;
                        }
                        break;
                    }
                }

                if (!clickedOnToken) {
                    selectedToken = null;
                }
                drawTokens();
                drawUI();
            });

            window.addEventListener('mousemove', (e) => {
                if (dragToken) {
                    const rect = tokenCanvas.getBoundingClientRect();
                    const mouseX = (e.clientX - rect.left) / viewScale;
                    const mouseY = (e.clientY - rect.top) / viewScale;

                    dragToken.x = mouseX - gridSize/2;
                    dragToken.y = mouseY - gridSize/2;
                    drawTokens();
                    drawUI();
                }
            });

            window.addEventListener('mouseup', (e) => {
                if (e.button === 1 || e.button === 2 || isPanMode || (e.button === 0 && spacePressed) || isPanning) {
                    isPanning = false;
                }

                if (dragToken) {
                    // Snap to grid
                    dragToken.x = Math.round((dragToken.x - gridOffsetX) / gridSize) * gridSize + gridOffsetX;
                    dragToken.y = Math.round((dragToken.y - gridOffsetY) / gridSize) * gridSize + gridOffsetY;

                    socket.emit('move_token', {
                        token_id: dragToken.id,
                        x: dragToken.x,
                        y: dragToken.y
                    });

                    dragToken = null;
                    measuring = false;
                    drawTokens();
                    drawUI();
                }
            });

            // Touch Support for Mobile
            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2 || (e.touches.length === 1 && isPanMode)) return;

                const touch = e.touches[0];
                const rect = tokenCanvas.getBoundingClientRect();
                const mouseX = (touch.clientX - rect.left) / viewScale;
                const mouseY = (touch.clientY - rect.top) / viewScale;

                let clickedOnToken = false;
                for (let i = tokens.length - 1; i >= 0; i--) {
                    const t = tokens[i];
                    if (mouseX >= t.x && mouseX <= t.x + gridSize &&
                        mouseY >= t.y && mouseY <= t.y + gridSize) {

                        selectedToken = t;
                        clickedOnToken = true;

                        if (t.name.startsWith(PLAYER_NAME)) {
                            dragToken = t;
                            dragStartX = t.x;
                            dragStartY = t.y;
                            measuring = true;
                            e.preventDefault();
                        }
                        break;
                    }
                }

                if (!clickedOnToken) {
                    selectedToken = null;
                }
                drawTokens();
                drawUI();
            }, {passive: false});

            container.addEventListener('touchmove', (e) => {
                if (dragToken) {
                    const touch = e.touches[0];
                    const rect = tokenCanvas.getBoundingClientRect();
                    const mouseX = (touch.clientX - rect.left) / viewScale;
                    const mouseY = (touch.clientY - rect.top) / viewScale;

                    dragToken.x = mouseX - gridSize/2;
                    dragToken.y = mouseY - gridSize/2;
                    drawTokens();
                    drawUI();
                    e.preventDefault();
                }
            }, {passive: false});

            window.addEventListener('touchend', (e) => {
                if (dragToken) {
                    dragToken.x = Math.round((dragToken.x - gridOffsetX) / gridSize) * gridSize + gridOffsetX;
                    dragToken.y = Math.round((dragToken.y - gridOffsetY) / gridSize) * gridSize + gridOffsetY;

                    socket.emit('move_token', {
                        token_id: dragToken.id,
                        x: dragToken.x,
                        y: dragToken.y
                    });

                    dragToken = null;
                    measuring = false;
                    drawTokens();
                    drawUI();
                }
            });
        }

        // Sockets receiving
        socket.on('grid_updated', (data) => {
            gridSize = data.grid_size;
            gridOffsetX = data.grid_offset_x;
            gridOffsetY = data.grid_offset_y;
            gridColor = data.grid_color || 'rgba(255, 255, 255, 0.4)';
            gridThickness = data.grid_thickness || 1;
            scale = data.scale;
            drawAll();
        });

        socket.on('token_added', (token) => {
            tokens.push(token);
            drawTokens();
            drawUI();
        });

        socket.on('token_moved', (data) => {
            const t = tokens.find(tk => tk.id === data.token_id);
            if (t) {
                // If we are currently dragging this token locally, ignore the remote update to avoid jitter
                if (dragToken && dragToken.id === t.id) return;

                t.x = data.x;
                t.y = data.y;
                drawTokens();
                drawUI();
            }
        });

        socket.on('token_deleted', (data) => {
            tokens = tokens.filter(tk => tk.id !== data.token_id);
            if (dragToken && dragToken.id === data.token_id) {
                dragToken = null;
                measuring = false;
            }
            if (selectedToken && selectedToken.id === data.token_id) {
                selectedToken = null;
            }
            drawTokens();
            drawUI();
        });

        socket.on('fow_updated', (data) => {
            if (data.mask) {
                applyFowMask(data.mask);
            } else {
                fillFowFullBlack();
            }
        });

        socket.on('paint_updated', (data) => {
            if (data.paint_data) {
                const img = new Image();
                img.onload = () => {
                    paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
                    paintCtx.drawImage(img, 0, 0);
                };
                img.src = data.paint_data;
            } else {
                paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
            }
        });

    </script>
</body>
</html>
